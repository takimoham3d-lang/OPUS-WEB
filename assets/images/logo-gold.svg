<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#c41e3a" stroke="#cb884a" stroke-width="4"/>
  
  <!-- Musical notes -->
  <g transform="translate(50, 60)">
    <circle cx="0" cy="0" r="6" fill="#cb884a"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#cb884a" stroke-width="3"/>
    <path d="M 0 30 Q 10 25 10 15" stroke="#cb884a" stroke-width="2" fill="none"/>
  </g>
  
  <g transform="translate(100, 40)">
    <circle cx="0" cy="0" r="6" fill="#f6f6e9"/>
    <line x1="0" y1="0" x2="0" y2="35" stroke="#f6f6e9" stroke-width="3"/>
    <path d="M 0 35 Q 15 28 15 18" stroke="#f6f6e9" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="130" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#f6f6e9" text-anchor="middle">Opus</text>
  
  <!-- Gold accent line -->
  <line x1="30" y1="150" x2="170" y2="150" stroke="#cb884a" stroke-width="2"/>
</svg>